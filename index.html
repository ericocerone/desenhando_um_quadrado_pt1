<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <canvas id="myCanvas" width="800" height="600" style="border: 1px solid black;"></canvas>
</body>
    <script>
		const c = document.getElementById("myCanvas")
		const ctx = c.getContext("2d")

		const width = c.width
		const height = c.height
		const step = 100 // Por enquanto, vamos considerar que 100 equivale a 1 unidade

		ctx.beginPath()

		for (let x=0; x<=c.width; x+=step) {
			ctx.moveTo(x, 0);
			ctx.lineTo(x, c.height)
		}

		for (let y=0; y<=height; y+=step) {
			ctx.moveTo(0, y)
			ctx.lineTo(width, y)
		}
		ctx.stroke()
		ctx.closePath()
		
		// desenhando o quadrado
		ctx.beginPath()
		ctx.lineWidth = 4
		ctx.strokeStyle="green"
		ctx.moveTo(width/2, height/2) // Essas coordenadas equivalem ao ponto P(0, 0)
		ctx.lineTo(width/2+100, height/2) // P(1, 0)
		ctx.lineTo(width/2+100, height/2-100) // P(1, 1)
		ctx.lineTo(width/2, height/2-100) // P(0, 1)
		ctx.lineTo(width/2, height/2) // Aqui voltamos à origem, ou seja, quando P(0, 0)
		ctx.stroke()
	</script>
</html>
